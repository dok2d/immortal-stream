# ╔══════════════════════════════════════════════════════════════════╗
# ║              immortal-stream  —  example configuration           ║
# ╚══════════════════════════════════════════════════════════════════╝
#
# Layers (bottom → top):
#   1. Placeholder  — always sent to the target service; shown when no
#                     incoming stream is active. Keeps the broadcast alive.
#   2. Incoming     — live stream from any source (RTMP / RTSP / SRT /
#                     HLS / file / etc.). Replaces the placeholder while
#                     active.
#   3. Overlay      — image or text drawn on top of the incoming stream;
#                     visible ONLY when a stream is active.
#
# Copy this file to config.yaml, fill in your values, and mount it
# read-only into the container at /etc/immortal-stream/config.yaml.
#
# Out-of-the-box defaults work without any media files:
#   - Placeholder: black screen (no file needed)
#   - Overlay: disabled (enable and set text to use)
#   - Targets: empty (add via /target add or Telegram bot)


# ── General ───────────────────────────────────────────────────────────────────
# Log level: DEBUG, INFO, WARNING, ERROR.
# Can also be set via LOG_LEVEL env var; config file takes precedence.
log_level: INFO


# ── Ingest ─────────────────────────────────────────────────────────────────────
ingest:
  # TCP port for RTMP / RTSP ingestion.
  port: 1935

  # UDP port for SRT ingestion.
  srt_port: 8890

  # HLS ingest (disabled by default for security; enable if needed).
  hls: false
  hls_port: 8888

  # Set to true to only accept streams whose path ends with `allowed_key`.
  # Connect as: rtmp://host:1935/live/<allowed_key>
  # When false, any publisher is accepted on the /live/* path.
  stream_key_required: false
  allowed_key: ""        # e.g. "mysecretkey123"

  # ── Redundant sources (optional) ───────────────────────────────────
  # Define multiple named input sources ordered by priority (first = highest).
  # Each source connects to a distinct RTMP/SRT path:
  #   rtmp://host:1935/live/<name>
  #
  # The compositor always uses the highest-priority source that is currently
  # connected.  When that source drops, the system automatically fails over
  # to the next available one — without restarting the output FFmpeg process
  # or interrupting the connection to YouTube / Twitch / etc.
  #
  # When the primary source reconnects it is immediately promoted back.
  #
  # Leave empty (default) to accept any single stream on /live/* (legacy mode).
  redundant_sources: []
  # redundant_sources:
  #   - primary    # connect as rtmp://host:1935/live/primary   (highest priority)
  #   - backup     # connect as rtmp://host:1935/live/backup
  #   - emergency  # connect as rtmp://host:1935/live/emergency (lowest priority)


# ── Placeholder layer ──────────────────────────────────────────────────────────
# Shown to the target service whenever no incoming stream is active.
placeholder:
  # Type: black | text | image | video
  # "black" requires no files — good for testing out of the box.
  type: black

  # ── Text placeholder ─────────────────────────────────────────────
  # (used when type: text)
  # text: "Трансляция скоро начнётся"
  # font_path: /media/fonts/MyFont.ttf        # TTF/OTF font; JetBrains Mono used if omitted
  # font_size: 72
  # font_color: white                         # FFmpeg color name or #RRGGBB

  # ── Image/video placeholder ──────────────────────────────────────
  # Path to the placeholder file (image: JPEG/PNG, video: any FFmpeg-readable).
  # Required only when type is image or video.
  # path: /media/placeholder.jpg

  # Position (pixels from top-left). For text: 0,0 = centered.
  x: 0
  y: 0

  # Opacity 0.0 (transparent) … 1.0 (opaque).
  opacity: 1.0


# ── Supplementary overlay layer ────────────────────────────────────────────────
# Optional image or text drawn on top of the incoming stream.
# NOT shown during placeholder-only mode.
overlay:
  enabled: false

  # Type: image | text
  type: text

  # ── Text overlay ───────────────────────────────────────────────────
  text: "LIVE"
  # font_path: /media/fonts/MyFont.ttf        # TTF/OTF font; JetBrains Mono used if omitted
  font_size: 48
  font_color: white                           # FFmpeg color name or #RRGGBB

  # ── Image overlay ──────────────────────────────────────────────────
  # (used when type: image)
  # path: /media/overlay.png   # JPEG or PNG with optional transparency

  # Position of the overlay inside the output frame (pixels from top-left).
  x: 20
  y: 20

  # Opacity 0.0 … 1.0
  opacity: 0.9


# ── Output ─────────────────────────────────────────────────────────────────────
output:
  # One or more RTMP(S) destinations.
  # The output connection is established once at startup and never dropped,
  # regardless of changes in the incoming stream.
  # Leave empty to start without targets; add via Telegram bot: /target add <url>
  targets: []
  # targets:
  #   - rtmp://a.rtmp.youtube.com/live2/xxxx-xxxx-xxxx-xxxx
  #   - rtmp://live.twitch.tv/app/live_XXXXXXXXX_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  #   - rtmp://live.restream.io/live/YOUR_KEY

  video:
    width: 1920
    height: 1080
    fps: 30
    bitrate: 6000k       # target video bitrate
    preset: ultrafast    # FFmpeg x264 preset (ultrafast…veryslow); keep ultrafast for low CPU
    gop: 60              # keyframe interval in frames (= fps × 2 seconds recommended)

  audio:
    bitrate: 128k
    sample_rate: 44100   # Hz


# ── Telegram notifications + bot ───────────────────────────────────────────────
# Receive detailed event notifications in a Telegram chat (with IP, protocol,
# codec, resolution info).  The same bot token enables runtime configuration.
#
# Events: stream started/stopped, failover, process restarts, errors.
#
# Bot features:
#   - Inline keyboard buttons for all controls (menu-driven)
#   - Text commands still supported for power users
#
# Commands:
#   /menu                      — main menu with buttons
#   /status                    — current state and settings
#   /stop                      — pause all processes (compositor + output)
#   /resume                    — restart all processes
#   /placeholder black|text|image|video|opacity
#   /overlay off|text|image|x|y|opacity|size|color
#   /target list|add|remove|set
#   /output bitrate|fps|size|preset
#   /help
telegram:
  enabled: false
  bot_token: "1234567890:AAxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  chat_id: "-1001234567890"    # group/channel (negative) or user ID (positive)
